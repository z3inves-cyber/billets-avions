<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi des Billets d'Avion</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #10b981;
            --bg-color: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #1e293b;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Container principal en Côte-à-Côte (responsive) */
        .players-container {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            justify-content: center;
            flex-wrap: wrap; /* Aligne verticalement sur smartphone */
        }

        .player-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            flex: 1;
            min-width: 300px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .name-input {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: none;
            border-bottom: 2px dashed #cbd5e1;
            padding: 5px;
            width: 80%;
            margin-bottom: 15px;
            color: #334155;
        }

        .name-input:focus {
            outline: none;
            border-bottom-color: var(--primary-color);
        }

        /* Design du Billet d'avion */
        .ticket {
            width: 100%;
            height: 160px;
            background: #e2e8f0; /* Fond par défaut */
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid #cbd5e1;
            transition: all 0.5s ease;
        }

        /* Style quand le billet est à 100% */
        .ticket.completed {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border-color: #1d4ed8;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            animation: ticketAppears 0.5s ease-out forwards;
        }

        @keyframes ticketAppears {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Décoration style ticket d'avion (les encoches sur les côtés) */
        .ticket::before, .ticket::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transform: translateY(-50%);
        }
        .ticket::before { left: -10px; }
        .ticket::after { right: -10px; }

        .ticket-content {
            text-align: center;
            z-index: 1;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .ticket.completed .ticket-content {
            opacity: 1;
        }

        .ticket-title {
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
        }

        .ticket-status {
            margin-top: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* Remplissage de progression dans le billet */
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background-color: #93c5fd;
            width: 0%;
            transition: width 0.3s ease;
            z-index: 0;
        }
        .ticket.completed .progress-fill {
            display: none; /* Cache la barre de progression intermédiaire à 100% */
        }

        /* Contrôles (Boutons + / -) */
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.9);
            background-color: #cbd5e1;
        }

        .progress-text {
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        /* Message d'encouragement */
        .motivation-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #64748b;
            font-style: italic;
            text-align: center;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <h1>✈️ Objectif Décollage ! ✈️</h1>

    <div class="players-container">
        <div class="player-card">
            <input type="text" class="name-input" value="Aventurier 1" onchange="saveData()">
            
            <div class="ticket" id="ticket1">
                <div class="progress-fill" id="fill1"></div>
                <div class="ticket-content">
                    <p class="ticket-title">BILLET D'AVION</p>
                    <p class="ticket-status" id="status1">En attente...</p>
                </div>
            </div>

            <div class="controls">
                <button class="btn" onclick="updateProgress(1, -1)">-</button>
                <span class="progress-text" id="text1">0%</span>
                <button class="btn" onclick="updateProgress(1, 1)">+</button>
            </div>
            
            <div class="motivation-msg" id="msg1">C'est le moment de commencer !</div>
        </div>

        <div class="player-card">
            <input type="text" class="name-input" value="Aventurier 2" onchange="saveData()">
            
            <div class="ticket" id="ticket2">
                <div class="progress-fill" id="fill2"></div>
                <div class="ticket-content">
                    <p class="ticket-title">BILLET D'AVION</p>
                    <p class="ticket-status" id="status2">En attente...</p>
                </div>
            </div>

            <div class="controls">
                <button class="btn" onclick="updateProgress(2, -1)">-</button>
                <span class="progress-text" id="text2">0%</span>
                <button class="btn" onclick="updateProgress(2, 1)">+</button>
            </div>

            <div class="motivation-msg" id="msg2">Prêt pour l'aventure ?</div>
        </div>
    </div>

    <script>
        // Phrases d'encouragement selon le niveau de progression
        const messages = {
            start: ["Le premier pas est le plus important !", "C'est parti ! 🌍"],
            mid: ["À mi-chemin ! On ne lâche rien 💪", "Ça sent bientôt les vacances ! 🏖️"],
            almost: ["Presque arrivé ! Préparez les valises ! 🧳", "Plus que quelques efforts ! ⚡"],
            done: ["EMBARQUEMENT IMMÉDIAT ! 🎉✈️", "Billet validé ! Bon voyage ! 🎆"]
        };

        // Charger les données sauvegardées ou utiliser les valeurs par défaut
        let data = JSON.parse(localStorage.getItem('flightProgress')) || {
            p1: { name: "Aventurier 1", val: 0 },
            p2: { name: "Aventurier 2", val: 0 }
        };

        // Initialisation au chargement de la page
        document.querySelectorAll('.name-input')[0].value = data.p1.name;
        document.querySelectorAll('.name-input')[1].value = data.p2.name;
        render(1);
        render(2);

        function updateProgress(player, amount) {
            let p = player === 1 ? data.p1 : data.p2;
            p.val = Math.min(100, Math.max(0, p.val + amount)); // Garde entre 0 et 100
            render(player);
            saveData();
        }

        function render(player) {
            let p = player === 1 ? data.p1 : data.p2;
            
            // Éléments du DOM
            const fill = document.getElementById(`fill${player}`);
            const text = document.getElementById(`text${player}`);
            const ticket = document.getElementById(`ticket${player}`);
            const status = document.getElementById(`status${player}`);
            const msg = document.getElementById(`msg${player}`);

            // Mise à jour graphique
            text.innerText = `${p.val}%`;
            fill.style.width = `${p.val}%`;

            // Gestion du cap des 100% (Remplissage et style billet d'avion)
            if (p.val === 100) {
                ticket.classList.add('completed');
                status.innerText = `Validé pour : ${p.name}`;
                msg.innerHTML = `<strong>${messages.done[Math.floor(Math.random() * messages.done.length)]}</strong>`;
            } else {
                ticket.classList.remove('completed');
                status.innerText = "En attente...";
                
                // Sélection du message de motivation
                if (p.val <= 10) msg.innerText = messages.start[0];
                else if (p.val > 10 && p.val < 75) msg.innerText = messages.mid[Math.floor(Math.random() * messages.mid.length)];
                else if (p.val >= 75) msg.innerText = messages.almost[Math.floor(Math.random() * messages.almost.length)];
            }
        }

        function saveData() {
            data.p1.name = document.querySelectorAll('.name-input')[0].value;
            data.p2.name = document.querySelectorAll('.name-input')[1].value;
            localStorage.setItem('flightProgress', JSON.stringify(data));
        }
    </script>
</body>
</html>
